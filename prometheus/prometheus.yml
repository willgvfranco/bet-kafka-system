global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "api"
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics

  - job_name: "bet-processor"
    static_configs:
      - targets: ["bet-processor:9100"]

  - job_name: "odds-engine"
    static_configs:
      - targets: ["odds-engine:9100"]

  - job_name: "odds-consumer"
    static_configs:
      - targets: ["odds-consumer:9100"]

  - job_name: "fraud-detector"
    static_configs:
      - targets: ["fraud-detector:9100"]
