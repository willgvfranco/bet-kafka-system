services:
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "betting-platform-cluster-001"
    volumes:
      - kafkadata:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic game.events --partitions 6 --replication-factor 1 --bootstrap-server kafka:29092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic odds.updated --partitions 6 --replication-factor 1 --bootstrap-server kafka:29092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic bets.placed --partitions 12 --replication-factor 1 --bootstrap-server kafka:29092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic bets.settled --partitions 6 --replication-factor 1 --bootstrap-server kafka:29092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic markets.suspended --partitions 3 --replication-factor 1 --bootstrap-server kafka:29092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic fraud.alerts --partitions 3 --replication-factor 1 --bootstrap-server kafka:29092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic wallet.transactions --partitions 6 --replication-factor 1 --bootstrap-server kafka:29092 &&
      echo 'All topics created!'
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: betting-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: betting
    volumes:
      - mongodata:/data/db

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/etc/grafana/dashboards
      - grafanadata:/var/lib/grafana

  # --- Go Services ---

  seeder:
    build:
      context: .
      args:
        SERVICE: seeder
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_ADDR: redis:6379
      MONGO_URI: mongodb://mongodb:27017/betting

  api:
    build:
      context: .
      args:
        SERVICE: api
    ports:
      - "8080:8080"
    depends_on:
      seeder:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_ADDR: redis:6379
      MONGO_URI: mongodb://mongodb:27017/betting
      HTTP_PORT: "8080"

  data-feed-simulator:
    build:
      context: .
      args:
        SERVICE: data-feed-simulator
    depends_on:
      seeder:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
      MONGO_URI: mongodb://mongodb:27017/betting

  odds-engine:
    build:
      context: .
      args:
        SERVICE: odds-engine
    depends_on:
      seeder:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_ADDR: redis:6379
      MONGO_URI: mongodb://mongodb:27017/betting
      METRICS_PORT: "9100"

  bet-processor:
    build:
      context: .
      args:
        SERVICE: bet-processor
    depends_on:
      seeder:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_ADDR: redis:6379
      MONGO_URI: mongodb://mongodb:27017/betting
      METRICS_PORT: "9100"

  odds-consumer:
    build:
      context: .
      args:
        SERVICE: odds-consumer
    depends_on:
      seeder:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_ADDR: redis:6379
      METRICS_PORT: "9100"

  fraud-detector:
    build:
      context: .
      args:
        SERVICE: fraud-detector
    depends_on:
      seeder:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_ADDR: redis:6379
      METRICS_PORT: "9100"

volumes:
  kafkadata:
  redisdata:
  mongodata:
  grafanadata:
